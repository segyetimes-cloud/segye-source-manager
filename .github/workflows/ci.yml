name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  typecheck-and-test:
    name: Typecheck & Unit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: TypeScript typecheck
        run: npx tsc --noEmit

      - name: Run unit tests
        run: npm test

  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    # E2E는 실제 서버(Vercel preview) + 테스트 계정이 필요하므로
    # E2E_BASE_URL 시크릿이 설정된 환경에서만 실행
    if: ${{ vars.E2E_ENABLED == 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Run E2E tests
        run: npm run test:e2e
        env:
          E2E_BASE_URL:          ${{ secrets.E2E_BASE_URL }}
          E2E_REPORTER_EMAIL:    ${{ secrets.E2E_REPORTER_EMAIL }}
          E2E_REPORTER_PASSWORD: ${{ secrets.E2E_REPORTER_PASSWORD }}
          E2E_ADMIN_EMAIL:       ${{ secrets.E2E_ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD:    ${{ secrets.E2E_ADMIN_PASSWORD }}

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
